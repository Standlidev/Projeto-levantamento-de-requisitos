<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amigo Pet</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signup.css">
</head>
<body>
    
    <header>
        <a href="index.html"><img src="./images/logo.png" alt="logo Amigo pet" id="logo" height="120px" width="auto"></a>
        <div class="loginLink">Entre em sua conta</div>
        <div class="about">Sobre</div>
    </header>
 <div class="signupForm">
    <section id="ongoingText">
        <div id="ongoingTitle">Falta Pouco para você mudar uma vida!</div>
        <img src="images/undraw_good-doggy_4ast.svg" alt="" id="ongoingImg">
    </section>
    <section class="signupWindow">
        <div class="camps">
            <img src="./images/user.svg" alt="" class="userImg">
            <label for="">Nome Completo</label>
            <input type="text">
        </div>
        <div class="camps">
            <img src="./images/envelope-simple.svg" alt="" class="userImg">
            <label for="">E-mail</label>
            <input type="text">
        </div>
        <div class="camps">
            <img src="./images/identification-card.svg" alt="" class="userImg">
            <label for="">CPF</label>
            <input type="text">
        </div>
        <div class="camps">
            <img src="./images/map-pin.svg" alt="" class="userImg">
            <label for="">CEP</label>
            <input type="text">
        </div>
        <div class="camps">
            <img src="./images/lock.svg" alt=""class="userImg">
            <label for="">Senha</label>
            <input type="text">
        </div>
        <div class="camps">
            <img src="./images/check-circle.svg" alt="" class="userImg">
            <label for="">Confirma a senha</label>
            <input type="text">
        </div>
        <div id="preferenceConteiner">
            <input type="radio" name="preference" class="pref"><img src="./images/undraw_cat_lqdj.svg" alt="" class="imgPrefC">
            <input type="radio" name="preference" class="pref"><img src="./images/undraw_dog_jfxm.svg" alt="" class="imgPrefD">
        </div>
    </section>
 </div>

    <div class="modal-overlay" id="modalOverlay">
    <div class="modal-content">
        <span class="close-button" id="closeModal">X</span>
        <h2 id="loginTitle">Login</h2>
        <form>
            <label for="emailHolder">E-mail</label>
            <input type="email" placeholder="Seu e-mail" id="emailHolder">
            <label for="passwordCamp">Senha</label>
            <input type="password" placeholder="Sua senha" id="passwordCamp">
            <button type="submit" class="loginButton">Logar</button>
            <a href="#" class="forgotPassword">Esqueci a senha</a>
            
        </form>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
